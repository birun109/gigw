<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>GIGW 3.0 Content Quality Audit Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* --- BASE STYLES --- */
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        .header {
            background: #0b5d4c;
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 20px;
        }

        /* --- DASHBOARD SUMMARY CARDS --- */
        .summary {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 20px;
        }

        .card-stat {
            flex: 1;
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .green {
            color: #2e7d32;
        }

        .red {
            color: #c62828;
        }

        /* --- CHART AREA --- */
        .wcag-dashboard {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .wcag-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .chart-wrapper {
            position: relative;
            height: 280px;
        }

        /* --- CLAUSE GRID --- */
        .section-title {
            margin-top: 40px;
            font-weight: bold;
            color: #0b5d4c;
            font-size: 1.2em;
        }

        .clause-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .clause {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            border-left: 6px solid #c62828;
            transition: 0.3s;
            cursor: pointer;
        }

        .clause:hover {
            transform: scale(1.02);
        }

        .compliant {
            border-left-color: #2e7d32 !important;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        /* --- MODAL STYLES --- */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            width: 800px;
            max-width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 25px;
            border-radius: 10px;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .close-btn {
            float: right;
            cursor: pointer;
            font-size: 24px;
            font-weight: bold;
            color: #c62828;
            line-height: 1;
        }

        /* --- DETAILED CLAUSE CONTENT (Inside Modal) --- */
        .section-box {
            background: #e9eef5;
            padding: 20px;
            border-left: 6px solid #1f3c88;
            border-radius: 8px;
            margin-bottom: 30px;
            font-size: 15px;
            line-height: 1.5;
        }

        .section-box p {
            margin-top: 0;
            margin-bottom: 12px;
        }

        .section-box ul {
            margin-top: 0;
            margin-bottom: 12px;
        }

        .cards {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card-detail {
            flex: 1;
            min-width: 300px;
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border: 1px solid #ddd;
        }

        .success-card {
            border-top: 6px solid #2e7d32;
        }

        .failure-card {
            border-top: 6px solid #c62828;
        }

        .badge {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 12px;
        }

        .success-card .badge {
            background: #2e7d32;
        }

        .failure-card .badge {
            background: #c62828;
        }

        .logo-box {
            text-align: center;
            padding: 20px;
            border: 1px dashed #ccc;
            margin-bottom: 15px;
            background: #fafafa;
        }

        .success-card img {
            width: 120px;
            height: auto;
        }

        .failure-card img {
            width: 200px;
            height: 40px;
            filter: grayscale(80%);
        }

        .card-detail ul {
            padding-left: 20px;
            font-size: 14px;
            margin-top: 10px;
        }

        .card-detail h3 {
            margin-top: 0;
            font-size: 16px;
            margin-bottom: 5px;
        }

        code {
            background: #222;
            color: #00ff9d;
            padding: 10px;
            display: block;
            border-radius: 6px;
            font-size: 13px;
            overflow-x: auto;
            margin-top: 15px;
            white-space: pre-wrap;
        }

        /* --- ADDED SPECIFICALLY FOR NEW CLAUSE 5.1.2 --- */
        .card {
            flex: 1;
            min-width: 320px;
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        .success {
            border-top: 6px solid #28a745;
        }

        .failure {
            border-top: 6px solid #dc3545;
        }

        .success .badge {
            background: #28a745;
        }

        .failure .badge {
            background: #dc3545;
        }

        .preview-box {
            border: 1px dashed #ccc;
            padding: 15px;
            margin-bottom: 15px;
            background: #fafafa;
        }

        .preview-box header,
        .preview-box footer {
            padding: 10px;
            background: #1f3c88;
            color: white;
            font-size: 14px;
        }

        .preview-box .content {
            padding: 10px;
        }
    </style>
</head>

            });
